databases:
  - name: kouji-kanri-db
    plan: free
    databaseName: kouji_kanri
    user: kouji

services:
  - type: web
    name: kouji-kanri-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kouji-kanri-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: S3_ENDPOINT
        value: ""
      - key: S3_ACCESS_KEY
        value: ""
      - key: S3_SECRET_KEY
        value: ""
      - key: S3_BUCKET
        value: ""
      - key: RESEND_API_KEY
        value: "re_Sgq4xnPp_3pX4bwcQupXGFtRYG8FYysEv"
      - key: SMTP_FROM
        value: "noreply@soara-mu.com"
