databases:
  - name: kouji-kanri-db
    plan: free
    databaseName: kouji_kanri
    user: kouji
    # region は既存DBの場所と一致させる。新規作成時のみ反映。
    region: oregon

services:
  - type: web
    name: kouji-kanri-api
    runtime: python
    plan: free
    # region は既存サービスの再配置には影響しない。
    # service/DB が別リージョンの場合は database.py の _resolve_render_db_host が
    # 外部ホスト+sslmode=require で接続する。
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kouji-kanri-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      # S3/R2 ストレージ資格情報は dashboard 側で設定する (Blueprint で空文字に
      # 上書きしないよう sync:false)。設定すれば storage_service.py が自動切替。
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
