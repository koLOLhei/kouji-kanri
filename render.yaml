databases:
  - name: kouji-kanri-db
    plan: free
    databaseName: kouji_kanri
    user: kouji

services:
  - type: web
    name: kouji-kanri-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kouji-kanri-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: S3_ENDPOINT
        value: ""
      - key: S3_ACCESS_KEY
        value: ""
      - key: S3_SECRET_KEY
        value: ""
      - key: S3_BUCKET
        value: ""
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
