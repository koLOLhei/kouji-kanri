databases:
  - name: kouji-kanri-db
    plan: free
    databaseName: kouji_kanri
    user: kouji

services:
  - type: web
    name: kouji-kanri-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      # 日本語フォントを Linux 環境にインストール (Render Python runtime)
      apt-get update -qq && apt-get install -y -qq --no-install-recommends fonts-noto-cjk fonts-noto-cjk-extra fonts-ipafont-gothic fonts-ipafont-mincho 2>/dev/null || \
        (mkdir -p $HOME/.fonts && curl -fsSL https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf -o $HOME/.fonts/NotoSansCJKjp-Regular.otf && fc-cache -f 2>/dev/null) || \
        echo "[font-install] fallback failed, japanese PDF may render as tofu"
    startCommand: python start.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kouji-kanri-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: S3_ENDPOINT
        value: ""
      - key: S3_ACCESS_KEY
        value: ""
      - key: S3_SECRET_KEY
        value: ""
      - key: S3_BUCKET
        value: ""
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
